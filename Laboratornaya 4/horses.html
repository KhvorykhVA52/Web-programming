    <h2 align="center">Лошади</h2>

    <p align="justify">
    Лошади — одни из самых красивых и благородных животных на планете.
    Они были одомашнены около 4000–2000 лет до н.э. и с тех пор стали
    верными спутниками человека. Лошади использовались в сельском хозяйстве,
    на войне, в транспорте и спорте.
