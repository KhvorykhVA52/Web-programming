<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ столика — Суши-бар «Сакура»</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #fdf6ec; color: #333; }
        header { background-color: #c0392b; color: white; padding: 20px 30px; text-align: center; }
        header h1 { margin: 0; font-size: 2.2em; }
        nav { float: left; width: 150px; margin: 10px 30px 10px 0px; padding: 10px; border: black medium double; border-radius: 10px; background-color: #fff8f0; }
        nav div { font-size: 14pt; margin-top: 5px; margin-bottom: 5px; }
        nav a { text-decoration: none; color: #c0392b; }
        nav a:hover { text-decoration: underline; }
        main { margin-left: 200px; padding: 20px 30px; }
        main h2 { color: #c0392b; }
        footer { clear: both; background-color: #333; color: #ccc; text-align: center; padding: 15px; font-size: 0.9em; }
        footer a { color: #fad7a0; }
        form { background-color: #fff8f0; border: 1px solid #e0c090; border-radius: 10px; padding: 20px 30px; max-width: 600px; }
        label { font-weight: bold; color: #6b3a2a; }
        input[type="text"], input[type="time"] { width: 100%; padding: 6px; margin-top: 4px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        fieldset { border: 2px solid #c0392b; border-radius: 8px; margin-top: 15px; padding: 10px 15px; }
        legend { color: #c0392b; font-weight: bold; padding: 0 8px; }
        input[type="submit"] { background-color: #c0392b; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 1em; margin-top: 10px; }
        input[type="submit"]:hover { background-color: #a93226; }
    </style>
</head>
<body>
    <header><h1>🍣 Суши-Бар «Сакура»</h1></header>
    <nav>
        <div><a href="index.html">Главная</a></div>
        <div><a href="catalogosn.html">Горячие блюда</a></div>
        <div><a href="catalogsushi.html">Суши</a></div>
        <div><a href="catalogroll.html">Роллы</a></div>
        <div><a href="pricelist.html">Прайс-лист</a></div>
        <div>Заказ столика</div>
        <div><a href="takeaway.html">Еда на вынос</a></div>
    </nav>
    <main>
        <h2>Заказ столика</h2>
        <form action="mailto:order@yokogama.ru" method="post" enctype="text/plain">
            <p>
                <label for="name">Как к Вам обращаться?</label><br>
                <input type="text" name="name" id="name" required>
            </p>
            <p>
                <label for="phone">По какому телефону Вам перезвонить?</label><br>
                <input type="text" name="phone" id="phone" required>
            </p>
            <p>
                <label for="time">На какое время желаете заказать столик?</label><br>
                <input type="time" name="time" id="time" required>
            </p>
            <p>
                <label for="cnt">На сколько человек заказывается столик?</label><br>
                <input type="radio" name="cnt" id="cnt" value="1"> 1&nbsp;&nbsp;&nbsp;
                <input type="radio" name="cnt" value="2"> 2&nbsp;&nbsp;&nbsp;
                <input type="radio" name="cnt" value="more"> 3 и более
            </p>
            <p>
                <input type="checkbox" name="children" value="*">
                Среди клиентов будут дети
            </p>
            <p>
                <strong>Выберите на сколько Вам понравились наши блюда?</strong><br>
                <input type="range" min="1" max="10" value="8">
            </p>
            <fieldset>
                <legend>Имя и фамилия</legend>
                <p>Имя<br><input type="text" name="name1"></p>
                <p>Фамилия<br><input type="text" name="name2"></p>
            </fieldset>
            <p><input type="submit" value="Отправить"></p>
        </form>
    </main>
    <footer>
        <p>&copy; 2024 Суши-Бар «Сакура»</p>
        <p><a href="mailto:panchenkonb@tyuiu.ru">panchenkonb@tyuiu.ru</a></p>
    </footer>
</body>
</html>
